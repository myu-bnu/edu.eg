<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Student Portal بوابة الخدمات الطلابية">
    <title>MyU</title>

    <!-- Font Awesome (نفس أيقونات الموقع الأصلي) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- خط El Messiri العربي (نفس خط الموقع) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body class="login-screen">
    <main>
        <section>
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-12">
                        <div class="login-box">

                            <div class="login-content">
                                <div class="login-user-icon">
                                    <img src="logo.png" style="width: 180px;" alt="MyU"
                                         onerror="this.style.display='none';document.getElementById('logoFallback').style.display='inline-flex';">
                                    <!-- لو مفيش logo.png بيظهر اللوجو ده بديل -->
                                    <span id="logoFallback" class="logo-fallback" style="display:none;">
                                        <span class="lf-my">My</span>
                                        <svg viewBox="0 0 60 80" width="46" height="62" aria-label="U">
                                            <rect x="27" y="0" width="6" height="16" fill="#c0392b"/>
                                            <path d="M8 8 H22 V46 a8 8 0 0 0 16 0 V8 H52 V46 a22 22 0 0 1 -44 0 Z" fill="#c0392b"/>
                                            <line x1="14" y1="12" x2="14" y2="44" stroke="#e6b0aa" stroke-width="2"/>
                                            <line x1="46" y1="12" x2="46" y2="44" stroke="#e6b0aa" stroke-width="2"/>
                                        </svg>
                                    </span>
                                </div>
                                <h3>بوابة الخدمات الطلابية</h3>
                                <h5>نظام ابن الهيثم - جامعة بنها الأهلية</h5>
                            </div>

                            <div class="login-form">
                                <form id="frmLogin" action="#" method="post" class="form-horizontal ls_form">

                                    <div class="input-group ls-group-input">
                                        <input class="form-control" type="text" placeholder="اسم المستخدم"
                                               name="txtUserName" maxlength="20" required>
                                        <div class="input-group-append">
                                            <span class="input-group-text"><i class="fa fa-user"></i></span>
                                        </div>
                                    </div>

                                    <div class="input-group ls-group-input">
                                        <input type="password" placeholder="كلمة المرور" name="txtPassword"
                                               maxlength="50" class="form-control" required>
                                        <div class="input-group-append">
                                            <span class="input-group-text"><i class="fa fa-lock"></i></span>
                                        </div>
                                    </div>

                                    <div class="remember-me">
                                        <span>تذكرنى</span>
                                        <span class="ls-switch">
                                            <span class="ls-switch-knob"></span>
                                            <span class="ls-switch-x"><i class="fa fa-times"></i></span>
                                        </span>
                                    </div>

                                    <div class="input-group ls-group-input login-btn-box">
                                        <button type="submit" class="btn ls-dark-btn col-md-12 col-sm-12 col-xs-12">
                                            <i class="fa fa-key"></i>
                                        </button>
                                        <a class="forgot-password" href="javascript:void(0)" style="font-size: 13px;">نسيت كلمة المرور</a>
                                    </div>

                                </form>
                            </div>

                            <div class="anchors">
                                <a id="btnLang" href="javascript:void(0)" style="font-size: 13px;" key-lang="en">English</a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <p class="copy-right big-screen hidden-xs hidden-sm">
                جميع الحقوق محفوظة
                <span>©</span>
                <a href="https://www.intlaqcit.com/" target="_blank">شركة إنطلاق لتقنية الإتصالات والمعلومات</a>
                <br><span class="footer-year">2020</span>
            </p>
        </section>
    </main>

    <footer>
        <a id="btnPrivacy" href="javascript:void(0)"><i class="fas fa-shield-alt"></i> سياسة خصوصية وتأمين البيانات</a>
    </footer>

    <script>
        document.getElementById('frmLogin').addEventListener('submit', function (e) {
            e.preventDefault();
            var username = this.txtUserName.value.trim();
            var password = this.txtPassword.value;

            if (username === '25030103' && password === 'hamoza772007$') {
                window.location.href = 'home.html';
            } else {
                alert('اسم المستخدم أو كلمة المرور غير صحيحة');
            }
        });
    </script>
</body>
</html>
